name: Keep Alive Ping

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FinSight App
        run: |
          curl -s -L --max-time 30 https://finsight-lab.streamlit.app/ > /dev/null || true
